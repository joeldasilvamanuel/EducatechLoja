<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEMBER LOGIN | PREMIUM ACCESS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      /* Imagem de fundo principal (Onde você coloca a sua imagem adulta) */
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('/background_adulto.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      height: 100vh;
      display: flex;
      align-items: center;
      color: #ffffff;
      font-family: 'Arial Black', Gadget, sans-serif;
    }

    .login-container {
      display: flex;
      max-width: 900px;
      width: 100%;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #333;
      box-shadow: 0 0 50px rgba(230, 0, 0, 0.2);
    }

    /* Lado esquerdo: Espaço para a Imagem de Impacto */
    .login-banner {
      flex: 1;
      background: url('/public/v.jpg');
      background-size: cover;
      background-position: center;
      display: none; /* Escondido no mobile */
    }

    @media (min-width: 768px) {
      .login-banner { display: block; }
    }

    /* Lado direito: Formulário */
    .login-form-side {
      flex: 1;
      padding: 3rem;
    }

    .brand-logo {
      font-size: 2.2rem;
      color: #ff0000;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    .form-control {
      background: #111 !important;
      border: 1px solid #444 !important;
      color: #fff !important;
      border-radius: 0;
      margin-bottom: 1rem;
    }

    .btn-evil {
      background: #ff0000;
      color: #fff;
      border: none;
      font-weight: bold;
      padding: 12px;
      border-radius: 0;
      transition: 0.3s;
    }

    .btn-evil:hover {
      background: #b30000;
      box-shadow: 0 0 15px #ff0000;
    }
  </style>
</head>

<body>
  <div class="container d-flex justify-content-center">
    <div class="login-container">
      
      <div class="login-banner">
          </div>

      <div class="login-form-side text-center">
        <div class="brand-logo">EVILANGEL</div>
        <p class="text-secondary small mb-4">MEMBERS AREA LOGIN</p>

        <form>
          <input type="text" class="form-control" placeholder="USERNAME">
          <input type="password" class="form-control" placeholder="PASSWORD">
          
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-evil">SIGN IN</button>
          </div>
        </form>

        <div class="mt-4 small">
          <a href="#" class="text-danger text-decoration-none d-block mb-2">JOIN NOW</a>
          <a href="#" class="text-secondary text-decoration-none">Forgot password?</a>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
